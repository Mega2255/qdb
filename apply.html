<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Digital — Start your application</title>
<style>
  :root{
    --bg: #f6ebe2;
    --ink: #221a3f;
    --ink-soft: #5b5478;
    --card-bg: #ffffff;
    --option-bg: #edeef1;
    --option-bg-hover: #e3e5ea;
    --option-border: #e2e3e8;
    --teal: #28e0c5;
    --teal-dark: #11b89f;
    --navy-card: #1d1a36;
    --gold: #d8b35a;
    --blue: #1559ff;
    --blue-bg: #eaf1ff;
    --footer-bg: #fbf7f3;
    --footer-border: rgba(34, 26, 63, 0.08);
    --footer-text: #6b6480;
    --footer-link: #221a3f;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
  }

  body{
    background: var(--bg);
    font-family: "Plus Jakarta Sans", "Segoe UI", system-ui, -apple-system, Helvetica, Arial, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  .main{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 5vw, 60px) clamp(16px, 5vw, 40px);
  }

  .stage{
    position: relative;
    width: 100%;
    max-width: 980px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .brand{
    font-size: clamp(28px, 5.5vw, 42px);
    font-weight: 800;
    letter-spacing: 0.06em;
    margin: 0 0 clamp(28px, 5vw, 46px);
    text-align: center;
    color: var(--ink);
  }

  .scene{
    position: relative;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- decorative bank-card stack (left) ---------- */
  .decor-left{
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-46%);
    width: 220px;
    height: 260px;
    pointer-events: none;
    z-index: 1;
  }

  .bank-card{
    position: absolute;
    width: 200px;
    height: 124px;
    border-radius: 14px;
    padding: 16px 18px;
    color: #fff;
    box-shadow: 0 18px 30px -10px rgba(20, 15, 40, 0.25);
  }

  .bank-card.navy{
    background: linear-gradient(155deg, #232049, var(--navy-card));
    top: 0;
    left: 10px;
    transform: rotate(-8deg);
    z-index: 2;
  }

  .bank-card.teal{
    background: linear-gradient(155deg, #2be3c9, #16c9ad);
    top: 110px;
    left: -30px;
    transform: rotate(-14deg);
    z-index: 1;
  }

  .chip{
    width: 26px;
    height: 18px;
    border-radius: 4px;
    background: linear-gradient(155deg, #efd28f, var(--gold));
    margin-bottom: 26px;
  }

  .bank-card .wordmark{
    font-size: 15px;
    font-weight: 700;
    line-height: 1.15;
  }

  /* ---------- decorative phone (right) ---------- */
  .decor-right{
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 168px;
    height: 320px;
    pointer-events: none;
    z-index: 1;
  }

  .phone{
    width: 100%;
    height: 100%;
    background: linear-gradient(165deg, #2b2750, var(--navy-card));
    border-radius: 28px;
    border: 6px solid #ffffff;
    box-shadow: 0 22px 40px -12px rgba(20, 15, 40, 0.3);
    padding: 16px 14px;
    color: #fff;
    position: relative;
  }

  .phone .pill{
    width: 30px;
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.25);
    margin: 0 auto 16px;
  }

  .phone .balance-label{
    font-size: 9px;
    color: rgba(255,255,255,0.55);
  }

  .phone .balance{
    font-size: 22px;
    font-weight: 800;
    margin: 2px 0 14px;
  }

  .phone .row{
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: rgba(255,255,255,0.7);
  }

  .phone .row span:last-child{
    color: #fff;
    font-weight: 700;
  }

  /* ---------- main form card ---------- */
  .form-card{
    position: relative;
    z-index: 5;
    background: var(--card-bg);
    border-radius: 22px;
    width: min(100%, 372px);
    padding: clamp(28px, 4vw, 40px) clamp(24px, 4vw, 36px);
    box-shadow: 0 30px 60px -20px rgba(40, 25, 70, 0.18), 0 6px 18px -8px rgba(40, 25, 70, 0.08);
  }

  .form-title{
    font-size: clamp(19px, 2.6vw, 22px);
    font-weight: 800;
    line-height: 1.32;
    margin: 0 0 clamp(20px, 3.5vw, 28px);
    color: var(--ink);
  }

  .options{
    display: flex;
    gap: 14px;
  }

  .option-box{
    flex: 1;
    background: var(--option-bg);
    border: 1px solid var(--option-border);
    border-radius: 14px;
    padding: 16px 10px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease, box-shadow 0.15s ease;
  }

  .option-box:hover{
    background: var(--blue-bg);
    border-color: var(--blue);
    transform: translateY(-2px);
  }

  .option-box:hover .icon-circle{
    border-color: var(--blue);
  }

  .option-box:hover .icon-circle svg{
    stroke: var(--blue);
  }

  .option-box:hover .option-label{
    color: var(--blue);
  }

  .option-box:active{
    transform: translateY(0);
  }

  .option-box:focus-visible{
    outline: 2px solid var(--blue);
    outline-offset: 2px;
  }

  .icon-circle{
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #ffffff;
    border: 1.5px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    transition: border-color 0.15s ease;
  }

  .icon-circle svg{
    width: 20px;
    height: 20px;
    stroke: var(--ink);
    transition: stroke 0.15s ease;
  }

  .option-label{
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    line-height: 1.25;
    transition: color 0.15s ease;
  }

  /* ---------- footer ---------- */
  .site-footer{
    background: var(--footer-bg);
    border-top: 1px solid var(--footer-border);
    padding: clamp(28px, 5vw, 40px) clamp(16px, 5vw, 40px) clamp(24px, 4vw, 34px);
  }

  .footer-inner{
    max-width: 560px;
    margin: 0 auto;
    text-align: center;
  }

  .footer-notice{
    font-size: 13px;
    line-height: 1.6;
    color: var(--footer-text);
    margin: 0 0 24px;
  }

  .footer-notice a{
    color: var(--footer-link);
    text-decoration: underline;
    font-weight: 600;
  }

  .footer-badges{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
  }

  .badge{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  
  .badge-switch{
    width: 92px;
    height: 56px;
    border-radius: 8px;
    border: 1.5px solid var(--footer-link);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px 6px;
    color: var(--footer-link);
  }

  .badge-switch svg{
    width: 16px;
    height: 16px;
    stroke: var(--footer-link);
    margin-bottom: 2px;
  }

  .badge-switch .badge-title{
    font-size: 7.5px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-align: center;
    line-height: 1.3;
  }

  .footer-legal{
    font-size: 12px;
    line-height: 1.6;
    color: var(--footer-text);
    margin: 0 0 14px;
  }

  .footer-copyright{
    font-size: 12px;
    color: var(--footer-text);
    margin: 0 0 16px;
  }

  .footer-links{
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .footer-links a{
    color: var(--footer-link);
    text-decoration: underline;
    font-weight: 600;
  }

  .footer-links .divider{
    margin: 0 8px;
    color: var(--footer-text);
  }

  /* ---------- responsive ---------- */
  @media (max-width: 880px){
    .decor-left{ left: -40px; }
    .decor-right{ right: -50px; }
  }

  @media (max-width: 720px){
    .decor-left, .decor-right{ display: none; }
  }

  @media (max-width: 380px){
    .form-card{ border-radius: 18px; }
    .options{ gap: 10px; }
    .option-box{ padding: 14px 6px 12px; }
    .icon-circle{ width: 40px; height: 40px; }
    .icon-circle svg{ width: 18px; height: 18px; }
    .option-label{ font-size: 12.5px; }
    .footer-badges{ gap: 14px; }
    .badge-fscs{ width: 48px; height: 48px; }
    .badge-switch{ width: 80px; height: 48px; }
    .footer-links{
      flex-direction: column;
      gap: 6px;
    }
    .footer-links .divider{
      display: none;
    }
  }

  @media (max-width: 320px){
    .options{ flex-direction: column; }
  }
</style>
</head>
<body>

  <main class="main">
  <div class="stage">
    <h1 class="brand">QUANTUM DIGITAL</h1>

    <div class="scene">
      <div class="decor-left" aria-hidden="true">
        <div class="bank-card navy">
          <div class="chip"></div>
          <div class="wordmark">Quantum<br>Digital</div>
        </div>
        <div class="bank-card teal">
          <div class="chip" style="background:rgba(255,255,255,0.6);"></div>
          <div class="wordmark">Quantum<br>Digital</div>
        </div>
      </div>

      <section class="form-card">
        <h2 class="form-title">Start your application for a Quantum Digital account</h2>

        <div class="options">
          <button type="button" class="option-box" id="newCustomerBtn" aria-label="New customer — start a new application">
            <span class="icon-circle">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </span>
            <span class="option-label">New customer</span>
          </button>

          <button type="button" class="option-box" id="existingCustomerBtn" aria-label="Existing customer — sign in">
            <span class="icon-circle">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 0 1 15.5-6.36L21 8"></path>
                <path d="M21 3v5h-5"></path>
                <path d="M21 12a9 9 0 0 1-15.5 6.36L3 16"></path>
                <path d="M3 21v-5h5"></path>
              </svg>
            </span>
            <span class="option-label">Existing customer</span>
          </button>
        </div>
      </section>

      <div class="decor-right" aria-hidden="true">
        <div class="phone">
          <div class="pill"></div>
          <div class="balance-label">Available balance</div>
          <div class="balance">£2,148.20</div>
          <div class="row"><span>Groceries</span><span>£42.60</span></div>
          <div class="row"><span>Transport</span><span>£10.00</span></div>
          <div class="row"><span>Subscriptions</span><span>£32.80</span></div>
          <div class="row"><span>Coffee</span><span>£6.80</span></div>
        </div>
      </div>
    </div>
  </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      
      <p class="footer-links">
        <a href="index.html" id="mainSiteLink">Go back to main site</a>
        <span class="divider">|</span>
        <a href="#" id="manageCookiesLink">Manage cookies</a>
      </p>
    </div>
  </footer>

  <script>
    document.getElementById('newCustomerBtn').addEventListener('click', function(){
      window.location.href = 'register.html';
    });
    document.getElementById('existingCustomerBtn').addEventListener('click', function(){
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
